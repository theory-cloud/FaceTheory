# Machine-readable decision guidance for FaceTheory

decisions:
  rendering_mode_selection:
    question: "Which FaceTheory route mode should be used (`ssr`, `ssg`, or `isr`)?"
    decision_tree:
      - condition: "The page can be produced at build time and does not need per-request personalization."
        check: "Can the route be generated by the SSG workflow (`buildSsgSite` / `npm run ssg`)?"
        if_yes:
          choice: "Use `mode: ssg`."
          reason: "This keeps requests on the S3/CloudFront static path and avoids Lambda runtime cost."
          example: |
            Use SSG build flow from `ts/src/ssg-cli.ts`:
            npm run ssg -- --entry ./examples/ssg-basic/faces.ts --out ./dist-site
        if_no:
          choice: "Evaluate ISR vs SSR based on freshness requirements."
          reason: "Dynamic freshness may require runtime regeneration."
      - condition: "The page can be cached but needs periodic regeneration."
        check: "Do you have HTML object storage and metadata/lease storage (S3 + TableTheory/Dynamo)?"
        if_yes:
          choice: "Use `mode: isr` with FaceTheory ISR runtime (`S3HtmlStore` + `FaceTheoryIsrMetaStore`)."
          reason: "Blocking ISR provides deterministic regeneration with lease control and stale fallback."
          example: |
            Confirm ISR state header during verification:
            curl -I https://<cloudfront-domain>/isr-demo
            # expect: x-facetheory-isr: miss|hit|wait-hit|stale
        if_no:
          choice: "Use `mode: ssr` until ISR storage dependencies are provisioned."
          reason: "ISR correctness depends on coordinated HTML pointer + lease metadata stores."

  aws_entrypoint_selection:
    question: "How should a FaceTheory app be exposed on AWS?"
    decision_tree:
      - condition: "You are deploying production traffic with mixed static assets and dynamic pages."
        check: "Can you route through CloudFront with S3 + Lambda Function URL origins?"
        if_yes:
          choice: "Use the documented two-origin topology from `docs/AWS_DEPLOYMENT_SHAPE.md`."
          reason: "It separates cache behavior for static and dynamic paths and supports SSG/ISR patterns."
          example: |
            Reference stacks:
            - infra/apptheory-ssr-site/
            - infra/apptheory-ssg-isr-site/
        if_no:
          choice: "UNKNOWN: direct Lambda URL-only deployment guidance is not fully specified for production parity."
          reason: "TODO: document explicit non-CloudFront production limits and guardrails if needed."

  upstream_dependency_policy:
    question: "How should AppTheory/TableTheory dependencies be installed?"
    decision_tree:
      - condition: "The dependency is AppTheory or TableTheory."
        check: "Is installation pinned to GitHub release tarballs listed in `docs/UPSTREAM_RELEASE_PINS.md`?"
        if_yes:
          choice: "Keep the pinned tarball policy."
          reason: "The repo states GitHub releases are source-of-truth and npm registry drift is unsupported."
          example: |
            npm install --save-exact \
              https://github.com/theory-cloud/AppTheory/releases/download/v0.9.0/theory-cloud-apptheory-0.9.0.tgz
        if_no:
          choice: "Do not publish docs claiming compatibility; add TODO and pin versions first."
          reason: "Unpinned installs can break runtime and infra examples."
