# =============================================================
# FaceTheory sidebar navigation
# =============================================================
# Each group has a label and a list of items.
# Each item:
#   id     — stable identifier (used for prev/next + page lookups)
#   title  — sidebar label
#   url    — Jekyll-relative URL (will be prefixed with site.baseurl)
#   icon   — lucide-style icon id rendered by _includes/icon.html
#   tag    — optional: new | beta | ga
#   surface — optional: overrides the page surface (e.g. auth for the
#             Autheory integration page)
#
# Adding a new page: create the markdown file under docs/ and add an
# entry here. Update `order` below if it should appear in prev/next,
# and `url_to_id` for active-link + pager lookup.
# =============================================================

groups:
  - label: Overview
    items:
      - { id: home, title: Welcome, url: /, icon: home }
      - {
          id: getting-started,
          title: Getting Started,
          url: /getting-started/,
          icon: play,
        }
      - {
          id: api-reference,
          title: API Reference,
          url: /api-reference/,
          icon: book,
          tag: ga,
        }
      - {
          id: architecture,
          title: Architecture,
          url: /architecture/,
          icon: compass,
        }
      - {
          id: aws-deployment-shape,
          title: AWS Deployment Shape,
          url: /aws-deployment-shape/,
          icon: cloud,
        }

  - label: Adapters
    items:
      - {
          id: adapter-react,
          title: React,
          url: /adapters/react/,
          icon: layers,
          tag: ga,
        }
      - {
          id: adapter-vue,
          title: Vue,
          url: /adapters/vue/,
          icon: layers,
          tag: ga,
        }
      - {
          id: adapter-svelte,
          title: Svelte,
          url: /adapters/svelte/,
          icon: layers,
          tag: ga,
        }

  - label: Render Modes
    items:
      - { id: mode-ssr, title: SSR, url: /modes/ssr/, icon: zap, tag: ga }
      - { id: mode-ssg, title: SSG, url: /modes/ssg/, icon: file-text, tag: ga }
      - {
          id: mode-isr,
          title: Blocking ISR,
          url: /modes/isr/,
          icon: repeat,
          tag: ga,
        }
      - { id: mode-spa, title: SPA Navigation, url: /modes/spa/, icon: shuffle }

  - label: Features
    items:
      - {
          id: feature-head,
          title: Deterministic Head,
          url: /features/head/,
          icon: list-checks,
        }
      - {
          id: feature-strict-csp,
          title: Strict CSP,
          url: /features/strict-csp/,
          icon: shield-check,
          tag: ga,
        }
      - {
          id: feature-oac-forms,
          title: OAC Mutating Forms,
          url: /features/oac-forms/,
          icon: key,
        }
      - {
          id: feature-ssr-hydration-sidecars,
          title: SSR Hydration Sidecars,
          url: /features/ssr-hydration-sidecars/,
          icon: share,
        }
      - {
          id: feature-isr-tenant-safety,
          title: ISR Tenant Safety,
          url: /features/isr-tenant-safety/,
          icon: lock,
          tag: ga,
        }
      - {
          id: feature-operator-visibility,
          title: Operator Visibility,
          url: /features/operator-visibility/,
          icon: compass,
        }

  - label: Integrations
    items:
      - {
          id: int-apptheory,
          title: AppTheory,
          url: /integrations/apptheory/,
          icon: zap,
        }
      - {
          id: int-tabletheory,
          title: TableTheory,
          url: /integrations/tabletheory/,
          icon: database,
        }
      - {
          id: int-autheory,
          title: Autheory,
          url: /integrations/autheory/,
          icon: key,
          surface: auth,
        }

  - label: CDK
    items:
      - { id: cdk-overview, title: CDK Overview, url: /cdk/, icon: package }
      - {
          id: cdk-aws-deployment,
          title: AWS Deployment,
          url: /cdk/aws-deployment/,
          icon: cloud,
        }
      - {
          id: cdk-operations,
          title: CDK Operations,
          url: /cdk/operations/,
          icon: tag,
        }

  - label: Guides
    items:
      - {
          id: core-patterns,
          title: Core Patterns,
          url: /core-patterns/,
          icon: compass,
        }
      - { id: testing-guide, title: Testing, url: /testing-guide/, icon: check }
      - {
          id: troubleshooting,
          title: Troubleshooting,
          url: /troubleshooting/,
          icon: life-buoy,
        }
      - {
          id: migration-guide,
          title: Migration,
          url: /migration-guide/,
          icon: arrow-right,
        }
      - {
          id: deprecation-policy,
          title: Deprecation Policy,
          url: /deprecation-policy/,
          icon: alert-triangle,
        }
      - {
          id: development-guidelines,
          title: Development Guidelines,
          url: /development-guidelines/,
          icon: check-square,
        }
      - { id: operations, title: Operations, url: /operations/, icon: clock }

  - label: Reference
    items:
      - {
          id: ref-face-module,
          title: FaceModule API,
          url: /reference/face-module/,
          icon: file-text,
          tag: ga,
        }
      - {
          id: ref-render-modes,
          title: Render Modes Compared,
          url: /reference/render-modes/,
          icon: list-checks,
        }

