contract:
  canonical_root: docs/
  fixed_ingestible:
    - docs/README.md
    - docs/_concepts.yaml
    - docs/_patterns.yaml
    - docs/_decisions.yaml
    - docs/getting-started.md
    - docs/api-reference.md
    - docs/core-patterns.md
    - docs/testing-guide.md
    - docs/troubleshooting.md
    - docs/migration-guide.md
  fixed_contract_only:
    - docs/_contract.yaml
    - docs/development-guidelines.md
  sanctioned_optional_ingestible:
    - docs/cdk/**
    - docs/migration/**
    - docs/llm-faq/**
  out_of_scope:
    - docs/development/**
    - docs/planning/**
    - docs/internal/**
    - docs/archive/**

notes:
  guidance: contract-only
  rule: Keep canonical user and operator retrieval under docs/ and sanctioned optional subtrees only.
