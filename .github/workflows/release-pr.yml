name: Release PR (main)

# This workflow remains a temporary automation exception to the human promotion
# rule that `main` receives promotion PRs from `staging` or `premain`. Release
# Please still prepares the stable version/changelog bump on its own branch until
# that flow is redesigned.

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".release-please-manifest.json"
      - "CHANGELOG.md"
      - "VERSION"
      - "README.md"
      - "docs/README.md"
      - "docs/api-reference.md"
      - "docs/getting-started.md"
      - "ts/README.md"
      - "ts/package.json"
      - "ts/package-lock.json"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute release-as (align to premain RC)
        id: version
        run: |
          set -euo pipefail

          release_as="$(
            python3 - <<'PY'
          import json
          from pathlib import Path


          def parse_base(v: str) -> tuple[int, int, int]:
              v = v.strip()
              if v.startswith("v"):
                  v = v[1:]
              v = v.split("+", 1)[0]
              base = v.split("-", 1)[0]
              parts = base.split(".")
              if len(parts) != 3:
                  raise ValueError(f"invalid semver base: {v}")
              return (int(parts[0]), int(parts[1]), int(parts[2]))


          stable = json.loads(Path(".release-please-manifest.json").read_text(encoding="utf-8")).get(".", "")
          premain = json.loads(Path(".release-please-manifest.premain.json").read_text(encoding="utf-8")).get(".", "")

          if not stable or not premain:
              raise SystemExit("")

          premain_base = premain.split("+", 1)[0].split("-", 1)[0]

          if parse_base(premain_base) > parse_base(stable):
              print(premain_base)
          PY
          )"

          echo "release_as=${release_as}" >> "${GITHUB_OUTPUT}"
          echo "release-as: ${release_as:-}"

      - name: Release Please (PR only) (aligned)
        if: steps.version.outputs.release_as != ''
        id: release_aligned
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          RELEASE_AS: ${{ steps.version.outputs.release_as }}
        run: |
          set -euo pipefail

          npx -y release-please@17.1.3 release-pr \
            --token "${RELEASE_PLEASE_TOKEN}" \
            --repo-url "${GITHUB_REPOSITORY}" \
            --target-branch main \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json \
            --release-as "${RELEASE_AS}"

      - name: Release Please (PR only)
        if: steps.version.outputs.release_as == ''
        id: release_default
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          npx -y release-please@17.1.3 release-pr \
            --token "${RELEASE_PLEASE_TOKEN}" \
            --repo-url "${GITHUB_REPOSITORY}" \
            --target-branch main \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json
