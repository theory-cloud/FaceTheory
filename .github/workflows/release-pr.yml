name: Release PR (main)

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".release-please-manifest.json"
      - "CHANGELOG.md"
      - "VERSION"
      - "README.md"
      - "docs/README.md"
      - "docs/api-reference.md"
      - "docs/getting-started.md"
      - "ts/README.md"
      - "ts/package.json"
      - "ts/package-lock.json"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.baseline.outputs.ready }}
      release_as: ${{ steps.version.outputs.release_as }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.sha }}

      - name: Check current release baseline
        id: baseline
        run: scripts/check-release-baseline-ready.sh .release-please-manifest.json

      - name: Compute release-as (align to premain RC)
        id: version
        if: steps.baseline.outputs.ready == 'true'
        run: |
          set -euo pipefail

          release_as="$(
            python3 - <<'PY'
          import json
          from pathlib import Path


          def parse_base(v: str) -> tuple[int, int, int]:
              v = v.strip()
              if v.startswith("v"):
                  v = v[1:]
              v = v.split("+", 1)[0]
              base = v.split("-", 1)[0]
              parts = base.split(".")
              if len(parts) != 3:
                  raise ValueError(f"invalid semver base: {v}")
              return (int(parts[0]), int(parts[1]), int(parts[2]))


          stable = json.loads(Path(".release-please-manifest.json").read_text(encoding="utf-8")).get(".", "")
          premain = json.loads(Path(".release-please-manifest.premain.json").read_text(encoding="utf-8")).get(".", "")

          if not stable or not premain:
              raise SystemExit("")

          premain_base = premain.split("+", 1)[0].split("-", 1)[0]

          if parse_base(premain_base) > parse_base(stable):
              print(premain_base)
          PY
          )"

          echo "release_as=${release_as}" >> "${GITHUB_OUTPUT}"
          echo "release-as: ${release_as:-}"

  release-please:
    needs: check-baseline
    if: needs.check-baseline.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Release Please (PR only) (aligned)
        if: needs.check-baseline.outputs.release_as != ''
        id: release_aligned
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ needs.check-baseline.outputs.release_as }}
          skip-github-release: true

      - name: Release Please (PR only)
        if: needs.check-baseline.outputs.release_as == ''
        id: release_default
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
