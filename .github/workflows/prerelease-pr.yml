name: Prerelease PR (premain)

on:
  push:
    branches: ["premain"]
    paths-ignore:
      - ".release-please-manifest.premain.json"
      - "CHANGELOG.md"
      - "VERSION"
      - "README.md"
      - "docs/README.md"
      - "docs/api-reference.md"
      - "docs/getting-started.md"
      - "ts/README.md"
      - "ts/package.json"
      - "ts/package-lock.json"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.baseline.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'premain' || github.sha }}

      - name: Check stable release baseline
        id: baseline
        run: scripts/check-release-baseline-ready.sh .release-please-manifest.json

  release-please:
    needs: check-baseline
    if: needs.check-baseline.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Release Please (PR only)
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: premain
          config-file: release-please-config.premain.json
          manifest-file: .release-please-manifest.premain.json
          skip-github-release: true
