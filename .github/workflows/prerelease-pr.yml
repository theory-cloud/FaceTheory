name: Prerelease PR (premain)

on:
  push:
    branches: ["premain"]
    paths-ignore:
      - ".release-please-manifest.premain.json"
      - "CHANGELOG.md"
      - "VERSION"
      - "README.md"
      - "docs/README.md"
      - "docs/api-reference.md"
      - "docs/getting-started.md"
      - "ts/README.md"
      - "ts/package.json"
      - "ts/package-lock.json"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check stable release baseline
        id: baseline
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: scripts/check-release-baseline-ready.sh .release-please-manifest.json

      - name: Release Please (PR only)
        id: release
        if: steps.baseline.outputs.ready == 'true'
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: premain
          config-file: release-please-config.premain.json
          manifest-file: .release-please-manifest.premain.json
          skip-github-release: true
