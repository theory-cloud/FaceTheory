name: Prerelease PR (premain)

on:
  push:
    branches: ["premain"]
    paths-ignore:
      - ".release-please-manifest.premain.json"
      - "CHANGELOG.md"
      - "VERSION"
      - "README.md"
      - "docs/README.md"
      - "docs/api-reference.md"
      - "docs/getting-started.md"
      - "ts/README.md"
      - "ts/package.json"
      - "ts/package-lock.json"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.ready.outputs.ready }}
      stable_ready: ${{ steps.stable.outputs.ready }}
      prerelease_ready: ${{ steps.prerelease.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'premain' || github.sha }}

      - name: Check stable release baseline
        id: stable
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/check-release-baseline-ready.sh .release-please-manifest.json

      - name: Check premain prerelease baseline
        id: prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/check-release-baseline-ready.sh .release-please-manifest.premain.json

      - name: Mark prerelease PR baseline readiness
        id: ready
        run: |
          if [[ "${{ steps.stable.outputs.ready }}" == "true" && "${{ steps.prerelease.outputs.ready }}" == "true" ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

  release-please:
    needs: check-baseline
    if: needs.check-baseline.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Release Please (PR only)
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          target-branch: premain
          config-file: release-please-config.premain.json
          manifest-file: .release-please-manifest.premain.json
          skip-github-release: true

      - name: Verify generated RC release PR postcondition
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/verify-release-pr-postcondition.sh prerelease
