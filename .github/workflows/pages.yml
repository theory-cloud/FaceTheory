# =============================================================
# FaceTheory · GitHub Pages — Theory Cloud Docs
#
# Builds the Jekyll site under docs/ and deploys it to GitHub Pages.
#
# TRIGGER POLICY:
#   - release.yml / release-pr.yml ......... trigger on `main`
#   - prerelease.yml / prerelease-pr.yml ... trigger on `premain`
#   - theorycloud-facetheory-subtree-publish.yml .. triggers on `premain` AND `main`
#   - pages.yml (this file) ................ triggers on `staging` ONLY
#
# Pages publish reflects what's on `staging` so docs iteration does not
# have to walk the full staging -> premain -> main release flow before
# users see updates. The site is documentation, not a released artifact;
# treating it as integration-branch output keeps the docs feedback loop
# tight. Defensive `if: github.ref == 'refs/heads/staging'` guards on
# every job make accidental non-staging runs (e.g. via a manual
# workflow_dispatch from a feature branch) a no-op.
#
# This workflow is independent of release.yml / prerelease.yml /
# ci.yml — it never publishes packages, never mutates tags,
# and never touches the release manifests.
# =============================================================
name: pages

on:
  # Staging is the only branch that publishes the Pages site.
  push:
    branches: [staging]
  # Manual re-deploy (e.g. after rotating the Pages environment, or to
  # republish after a docs-only fix that doesn't justify a new commit).
  # Defensive `if:` guards still enforce staging-only at the job level.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Coalesce in-flight deploys: GitHub Actions keeps at most one running
# and one pending run per concurrency group by default. With
# `cancel-in-progress: false`, the running deploy finishes, but a newer
# queued staging deploy replaces any older pending deploy. The site
# therefore converges on the latest staging commit instead of publishing
# every intermediate commit.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    # Belt-and-suspenders: even if someone invokes workflow_dispatch from
    # a non-staging ref, the job no-ops rather than building stale content.
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Jekyll build
        working-directory: docs
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --source . \
            --destination ./_site \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/_site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
