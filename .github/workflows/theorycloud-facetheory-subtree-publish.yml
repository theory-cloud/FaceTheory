name: FaceTheory TheoryCloud subtree publish

on:
  push:
    branches:
      - premain
      - main
    paths:
      - "docs/README.md"
      - "docs/_contract.yaml"
      - "docs/_concepts.yaml"
      - "docs/_patterns.yaml"
      - "docs/_decisions.yaml"
      - "docs/getting-started.md"
      - "docs/api-reference.md"
      - "docs/core-patterns.md"
      - "docs/testing-guide.md"
      - "docs/troubleshooting.md"
      - "docs/migration-guide.md"
      - "docs/cdk/**"
      - "docs/migration/**"
      - "docs/llm-faq/**"
      - "scripts/stage_theorycloud_facetheory_subtree.sh"
      - "scripts/verify_theorycloud_facetheory_subtree.sh"
      - "scripts/sync_theorycloud_facetheory_subtree.sh"
      - "scripts/trigger_theorycloud_publish.sh"
      - "scripts/test-theorycloud-targets.sh"
      - ".github/workflows/theorycloud-facetheory-subtree-publish.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: facetheory-theorycloud-subtree-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Checkout protected branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve no-vars stage rollout configuration
        run: |
          set -euo pipefail

          case "${GITHUB_REF_NAME}" in
            premain)
              {
                printf 'THEORYCLOUD_STAGE=lab\n'
                printf 'AWS_ROLE_ARN=%s\n' 'arn:aws:iam::787107040121:role/KnowledgeTheory-TheoryCloud-FaceTheory-lab-Publisher'
              } >> "${GITHUB_ENV}"
              ;;
            main)
              {
                printf 'THEORYCLOUD_STAGE=live\n'
                printf 'AWS_ROLE_ARN=%s\n' 'arn:aws:iam::787107040121:role/KnowledgeTheory-TheoryCloud-FaceTheory-live-Publisher'
              } >> "${GITHUB_ENV}"
              ;;
            *)
              echo "unsupported protected branch ref: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          printf 'THEORYCLOUD_PUBLISH_REASON=%s\n' "github:${GITHUB_REPOSITORY}:${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"

      - name: Validate publish workflow configuration
        run: |
          set -euo pipefail

          : "${AWS_REGION:?missing AWS region}"
          : "${THEORYCLOUD_STAGE:?missing stage resolution}"
          : "${AWS_ROLE_ARN:?missing literal stage-scoped AWS role ARN}"

          case "${THEORYCLOUD_STAGE}" in
            lab|live) ;;
            *)
              echo "unsupported theorycloud stage: ${THEORYCLOUD_STAGE}" >&2
              exit 1
              ;;
          esac

          case "${THEORYCLOUD_STAGE}:${AWS_ROLE_ARN}" in
            lab:arn:aws:iam::787107040121:role/KnowledgeTheory-TheoryCloud-FaceTheory-lab-Publisher) ;;
            live:arn:aws:iam::787107040121:role/KnowledgeTheory-TheoryCloud-FaceTheory-live-Publisher) ;;
            *)
              echo "unexpected role binding for stage ${THEORYCLOUD_STAGE}: ${AWS_ROLE_ARN}" >&2
              exit 1
              ;;
          esac

      - name: Assume stage-scoped theorycloud publish role
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: facetheory-${{ github.ref_name }}-${{ github.run_id }}

      - name: Install awscurl
        run: |
          set -euo pipefail

          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user awscurl
          printf '%s\n' "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Sync FaceTheory subtree into shared theorycloud source state
        run: |
          set -euo pipefail

          bash scripts/sync_theorycloud_facetheory_subtree.sh \
            --stage "${THEORYCLOUD_STAGE}" \
            --output /tmp/facetheory-theorycloud

      - name: Trigger shared theorycloud publish
        env:
          SOURCE_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail

          bash scripts/trigger_theorycloud_publish.sh \
            --stage "${THEORYCLOUD_STAGE}" \
            --source-revision "${SOURCE_REVISION}"
