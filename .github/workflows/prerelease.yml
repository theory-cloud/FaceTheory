name: Prerelease (premain)

on:
  push:
    branches: ["premain"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.baseline.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'premain' || github.sha }}

      - name: Check stable release baseline
        id: baseline
        run: scripts/check-release-baseline-ready.sh .release-please-manifest.json

  release-please:
    needs: check-baseline
    if: needs.check-baseline.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Release Please (Prerelease)
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          target-branch: premain
          config-file: release-please-config.premain.json
          manifest-file: .release-please-manifest.premain.json
          skip-github-pull-request: true

  build-release-assets:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (for release assets)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Fetch main + premain (release branch verification)
        run: git fetch origin main premain --force

      - name: Verify tag was cut from the correct branch
        run: scripts/verify-release-branch.sh "${{ needs.release-please.outputs.tag_name }}"

      - name: Set SOURCE_DATE_EPOCH (deterministic artifacts)
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24.13.1"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ".go-version"
          cache: false

      - name: Install dependencies
        run: cd ts && npm ci

      - name: Build + verify
        run: make rubric

      - name: Build release assets
        run: scripts/build-release-assets.sh "${{ needs.release-please.outputs.version }}" dist

      - name: Generate SHA-256 checksums
        run: scripts/generate-checksums.sh

      - name: Render release notes template
        run: scripts/render-release-notes.sh "${{ needs.release-please.outputs.tag_name }}"

      - name: Upload release asset bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: facetheory-prerelease-assets
          path: |
            dist/theory-cloud-facetheory*.tgz
            dist/facetheory-reference-*.tar.gz
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.md
          if-no-files-found: error

  publish-prerelease:
    needs:
      - release-please
      - build-release-assets
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release asset bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: facetheory-prerelease-assets
          path: dist

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-assets: FAIL (missing tag_name output)"
            exit 1
          fi

          is_draft="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft')"
          if [[ "${is_draft}" != "true" ]]; then
            echo "release-assets: FAIL (release is already published; cannot upload assets/notes under immutable releases)"
            exit 1
          fi

          mapfile -t existing_assets < <(gh release view "${TAG_NAME}" --json assets --jq '.assets[].name' 2>/dev/null || true)

          assets=(
            dist/theory-cloud-facetheory*.tgz
            dist/facetheory-reference-*.tar.gz
            dist/SHA256SUMS.txt
          )

          for asset_glob in "${assets[@]}"; do
            for asset_path in ${asset_glob}; do
              asset_name="$(basename "${asset_path}")"
              if printf '%s\n' "${existing_assets[@]}" | grep -Fxq "${asset_name}"; then
                echo "release-assets: skip existing ${asset_name}"
                continue
              fi
              gh release upload "${TAG_NAME}" "${asset_path}"
            done
          done

      - name: Publish prerelease (immutable)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-assets: FAIL (missing tag_name output)"
            exit 1
          fi

          is_draft="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft')"
          if [[ "${is_draft}" != "true" ]]; then
            echo "release-assets: skip publish (already published)"
            exit 0
          fi

          gh release edit "${TAG_NAME}" --draft=false --prerelease --notes-file dist/RELEASE_NOTES.md

  cleanup-failed-draft:
    needs:
      - release-please
      - build-release-assets
      - publish-prerelease
    if: >-
      ${{
        always() &&
        needs.release-please.outputs.release_created == 'true' &&
        (
          needs.build-release-assets.result == 'failure' ||
          needs.build-release-assets.result == 'cancelled' ||
          needs.publish-prerelease.result == 'failure' ||
          needs.publish-prerelease.result == 'cancelled'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Cleanup failed draft prerelease (no remnants)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-cleanup: SKIP (missing tag_name output)"
            exit 0
          fi

          is_draft="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null || true)"
          if [[ "${is_draft}" != "true" ]]; then
            echo "release-cleanup: SKIP (release not draft or not found)"
            exit 0
          fi

          echo "release-cleanup: deleting draft release and tag ${TAG_NAME}"
          gh release delete "${TAG_NAME}" --yes || true
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG_NAME}" || true
