name: Prerelease (premain)

on:
  push:
    branches: ["premain"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.baseline.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'premain' || github.sha }}

      - name: Check stable release baseline
        id: baseline
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/check-release-baseline-ready.sh .release-please-manifest.json

  release-please:
    needs: check-baseline
    if: needs.check-baseline.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Release Please (Prerelease)
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          target-branch: premain
          config-file: release-please-config.premain.json
          manifest-file: .release-please-manifest.premain.json
          skip-github-pull-request: true

  build-release-assets:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (for release assets)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          # Draft GitHub Releases do not guarantee a git tag exists until the
          # release is published. Build from the release commit and verify the
          # draft's target before uploading immutable assets.
          ref: ${{ github.sha }}

      - name: Fetch main + premain (release branch verification)
        run: git fetch origin main premain --force

      - name: Verify draft release targets this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/verify-release-draft-target.sh "${{ needs.release-please.outputs.tag_name }}" "${{ github.sha }}"

      - name: Verify release source branch
        run: scripts/verify-release-branch.sh "${{ needs.release-please.outputs.tag_name }}"

      - name: Set SOURCE_DATE_EPOCH (deterministic artifacts)
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24.13.1"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ".go-version"
          cache: false

      - name: Install dependencies
        run: cd ts && npm ci

      - name: Build + verify
        run: make rubric

      - name: Build release assets
        run: scripts/build-release-assets.sh "${{ needs.release-please.outputs.version }}" dist

      - name: Generate SHA-256 checksums
        run: scripts/generate-checksums.sh


      - name: Upload release asset bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: facetheory-prerelease-assets
          path: |
            dist/theory-cloud-facetheory*.tgz
            dist/facetheory-reference-*.tar.gz
            dist/SHA256SUMS.txt
          if-no-files-found: error

  publish-prerelease:
    needs:
      - release-please
      - build-release-assets
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release asset bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: facetheory-prerelease-assets
          path: dist

      - name: Upload and publish draft prerelease assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY:?}"
          dist_dir="dist"
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-assets: FAIL (missing tag name)"
            exit 1
          fi

          release_json=""
          for page in $(seq 1 10); do
            page_file="$(mktemp)"
            gh api "repos/${repo}/releases?per_page=100&page=${page}" > "${page_file}"
            match="$(
              TAG_NAME="${TAG_NAME}" python3 - "${page_file}" <<'PY'
          import json
          import os
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          for release in data:
              if release.get("tag_name") == os.environ["TAG_NAME"] and release.get("draft") is True:
                  print(json.dumps(release, separators=(",", ":")))
                  break
          PY
            )"
            count="$(python3 - "${page_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          print(len(data) if isinstance(data, list) else 0)
          PY
            )"
            rm -f "${page_file}"
            if [[ -n "${match}" ]]; then
              release_json="${match}"
              break
            fi
            [[ "${count}" -lt 100 ]] && break
          done

          if [[ -z "${release_json}" ]]; then
            echo "release-assets: FAIL (draft release ${TAG_NAME} not found)"
            exit 1
          fi

          mapfile -t release_fields < <(
            RELEASE_JSON="${release_json}" python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RELEASE_JSON"])
          print(str(data.get("id") or ""))
          print("true" if data.get("prerelease") is True else "false")
          print(data.get("upload_url") or "")
          print(data.get("html_url") or "")
          PY
          )
          release_id="${release_fields[0]:-}"
          is_prerelease="${release_fields[1]:-false}"
          upload_url="${release_fields[2]:-}"
          release_url="${release_fields[3]:-}"

          if [[ -z "${release_id}" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} draft missing release id)"
            exit 1
          fi
          if [[ "${TAG_NAME}" =~ -rc(\.|$) && "${is_prerelease}" != "true" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} draft must be marked prerelease)"
            exit 1
          fi
          if [[ ! "${TAG_NAME}" =~ -rc(\.|$) && "${is_prerelease}" == "true" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} stable draft must not be marked prerelease)"
            exit 1
          fi

          mapfile -t existing_assets < <(gh api "repos/${repo}/releases/${release_id}/assets" --jq '.[].name' 2>/dev/null || true)
          upload_base="${upload_url%%\{*}"
          if [[ -z "${upload_base}" ]]; then
            upload_base="https://uploads.github.com/repos/${repo}/releases/${release_id}/assets"
          fi

          shopt -s nullglob
          asset_paths=(
            "${dist_dir}"/theory-cloud-facetheory*.tgz
            "${dist_dir}"/facetheory-reference-*.tar.gz
            "${dist_dir}"/SHA256SUMS.txt
          )
          shopt -u nullglob
          if [[ "${#asset_paths[@]}" -eq 0 ]]; then
            echo "release-assets: FAIL (no release assets found in ${dist_dir})"
            exit 1
          fi

          for asset_path in "${asset_paths[@]}"; do
            asset_name="$(basename "${asset_path}")"
            if printf '%s\n' "${existing_assets[@]}" | grep -Fxq "${asset_name}"; then
              echo "release-assets: skip existing ${asset_name}"
              continue
            fi
            encoded_name="$(ASSET_NAME="${asset_name}" python3 - <<'PY'
          import os
          import urllib.parse

          print(urllib.parse.quote(os.environ["ASSET_NAME"]))
          PY
            )"
            gh api \
              --method POST \
              "${upload_base}?name=${encoded_name}" \
              --header "Content-Type: application/octet-stream" \
              --input "${asset_path}" \
              >/dev/null
          done

          gh api \
            --method PATCH \
            "repos/${repo}/releases/${release_id}" \
            -F draft=false \
            -F prerelease=true \
            >/dev/null
          echo "release-assets: published ${TAG_NAME}${release_url:+ (${release_url})}"

  cleanup-failed-draft:
    needs:
      - release-please
      - build-release-assets
      - publish-prerelease
    if: >-
      ${{
        always() &&
        needs.release-please.outputs.release_created == 'true' &&
        (
          needs.build-release-assets.result == 'failure' ||
          needs.build-release-assets.result == 'cancelled' ||
          needs.publish-prerelease.result == 'failure' ||
          needs.publish-prerelease.result == 'cancelled'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Cleanup failed draft prerelease (no remnants)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-cleanup: SKIP (missing tag_name output)"
            exit 0
          fi

          release_id=""
          for attempt in 1 2 3 4 5 6; do
            release_id="$(
              TAG_NAME="${TAG_NAME}" gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
                --jq 'map(select(.tag_name == env.TAG_NAME and .draft == true)) | .[0].id // ""' \
                2>/dev/null || true
            )"
            [[ -n "${release_id}" ]] && break
            sleep 5
          done

          if [[ -z "${release_id}" ]]; then
            echo "release-cleanup: SKIP (draft release not found)"
            exit 0
          fi

          echo "release-cleanup: deleting draft release ${release_id} and tag ${TAG_NAME}"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}" || true
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG_NAME}" || true
