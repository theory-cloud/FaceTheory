name: CI

on:
  pull_request:
  push:
    branches:
      - staging
      - premain
      - main

permissions:
  contents: read

jobs:
  prerelease-readiness:
    name: Prerelease readiness (staging -> premain)
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'premain' && github.event.pull_request.head.ref == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify user-facing conventional commits exist
        run: |
          set -euo pipefail

          git fetch origin premain staging --force
          range="origin/premain..origin/staging"

          echo "Checking commits in ${range}..."
          if git log --format=%s "${range}" | grep -Eq '^(feat|fix|perf)(\([^)]+\))?(!)?: '; then
            echo "prerelease-ready: OK"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMR origin/premain...origin/staging)
          if [[ "${#changed_files[@]}" -gt 0 ]]; then
            release_sync_only="true"
            for path in "${changed_files[@]}"; do
              case "${path}" in
                .github/workflows/* \
                | .release-please-manifest*.json \
                | release-please-config*.json \
                | VERSION \
                | CHANGELOG.md \
                | README.md \
                | Makefile \
                | .gitignore \
                | docs/README.md \
                | docs/api-reference.md \
                | docs/getting-started.md \
                | scripts/build-release-assets.sh \
                | scripts/generate-checksums.sh \
                | scripts/read-version.sh \
                | scripts/render-release-notes.sh \
                | scripts/verify-release-branch.sh \
                | scripts/verify-ts-pack.sh \
                | scripts/verify-version-alignment.sh \
                | ts/README.md \
                | ts/package-lock.json \
                | ts/package.json)
                  ;;
                *)
                  release_sync_only="false"
                  break
                  ;;
              esac
            done

            if [[ "${release_sync_only}" == "true" ]]; then
              echo "prerelease-ready: OK (release sync only change)"
              printf '%s\n' "${changed_files[@]}"
              exit 0
            fi
          fi

          echo "prerelease-ready: FAIL"
          echo "No user-facing conventional commits (feat:/fix:/perf:) found in ${range}."
          echo "release-please will skip, so no new prerelease tag will be cut."
          echo
          echo "Commit subjects:"
          git log --format=%s "${range}" || true
          exit 1

  version-alignment:
    name: Version alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify versions match VERSION
        run: scripts/verify-version-alignment.sh

  ts:
    name: TypeScript (typecheck + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: cd ts && npm ci
      - name: Run TypeScript gates
        run: |
          make ts-typecheck
          make ts-lint
          make ts-test

  ts-pack:
    name: TypeScript (npm pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - name: Verify tarball
        run: scripts/verify-ts-pack.sh

  rubric:
    name: rubric
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: cd ts && npm ci
      - name: Run full rubric
        run: make rubric
