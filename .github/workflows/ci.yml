name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - staging
      - premain
      - main
  workflow_dispatch:
    inputs:
      run_full_rubric:
        description: "Run Rubric (full gate set)"
        required: false
        type: boolean
        default: true
      run_deterministic_builds:
        description: "Run deterministic release-asset build verification"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  release-train-promotion:
    name: Release train promotion gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted release gate code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
          # Run verifier code from the protected staging lane, never from PR-head content.
          ref: refs/heads/staging
      - name: Verify release train promotion path
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          fetch_args=()
          if [[ "$(git rev-parse --is-shallow-repository)" == "true" ]]; then
            fetch_args=(--unshallow)
          fi
          git fetch --no-tags "${fetch_args[@]}" origin \
            "+refs/heads/staging:refs/remotes/origin/staging" \
            "+refs/heads/premain:refs/remotes/origin/premain" \
            "+refs/heads/main:refs/remotes/origin/main"

          base_ref_args=()
          case "${PR_BASE_REF}" in
            staging|premain|main)
              base_ref_args=(--base-ref "refs/remotes/origin/${PR_BASE_REF}")
              ;;
          esac

          if [[ ! -x scripts/verify-release-train-promotion.sh ]]; then
            echo "release-train-promotion: SKIP (trusted staging verifier is not present yet; bootstrap PR only)"
            exit 0
          fi

          scripts/verify-release-train-promotion.sh \
            --base "${PR_BASE_REF}" \
            --head "${PR_HEAD_REF}" \
            "${base_ref_args[@]}" \
            --head-sha "${PR_HEAD_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-head-repository "${PR_HEAD_REPOSITORY}" \
            --pr-title "${PR_TITLE}"

  prerelease-readiness:
    name: Prerelease readiness (staging -> premain)
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'premain' && github.event.pull_request.head.ref == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify user-facing conventional commits exist
        run: |
          git fetch origin premain staging --force
          scripts/verify-release-readiness.sh origin/premain origin/staging prerelease

  release-readiness:
    name: Release readiness (PR -> main)
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify user-facing conventional commits exist
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --force
          scripts/verify-release-readiness.sh "origin/${{ github.event.pull_request.base.ref }}" HEAD release

  version-alignment:
    name: Version alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify versions match VERSION
        run: scripts/verify-version-alignment.sh

  ts:
    name: TypeScript (typecheck + lint + test, Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "24"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: cd ts && npm ci
      - name: Run TypeScript gates
        run: |
          make ts-typecheck
          make ts-lint
          make ts-format-check
          make ts-examples-readmes
          make docs-export-map
          make ts-test
          make ts-coverage
      - name: Upload TypeScript coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: facetheory-ts-coverage-node-${{ matrix.node-version }}
          path: ts/coverage/
          if-no-files-found: warn

  ts-required:
    name: TypeScript (typecheck + lint + test)
    runs-on: ubuntu-latest
    needs: ts
    if: ${{ always() }}
    steps:
      - name: Require TypeScript matrix success
        env:
          TS_RESULT: ${{ needs.ts.result }}
        run: |
          if [[ "${TS_RESULT}" != "success" ]]; then
            echo "TypeScript matrix did not pass: ${TS_RESULT}" >&2
            exit 1
          fi

  ts-pack:
    name: TypeScript (npm pack, Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "24"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Verify tarball
        run: scripts/verify-ts-pack.sh

  ts-pack-required:
    name: TypeScript (npm pack)
    runs-on: ubuntu-latest
    needs: ts-pack
    if: ${{ always() }}
    steps:
      - name: Require npm pack matrix success
        env:
          TS_PACK_RESULT: ${{ needs['ts-pack'].result }}
        run: |
          if [[ "${TS_PACK_RESULT}" != "success" ]]; then
            echo "TypeScript npm pack matrix did not pass: ${TS_PACK_RESULT}" >&2
            exit 1
          fi

  deterministic-builds:
    name: Verify deterministic builds
    if: (github.event_name == 'workflow_dispatch' && (inputs.run_deterministic_builds == true || inputs.run_deterministic_builds == 'true')) || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'staging')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24.13.1"
      - name: Verify deterministic release asset builds
        run: scripts/verify-deterministic-builds.sh

  rubric:
    name: rubric
    if: (github.event_name == 'workflow_dispatch' && (inputs.run_full_rubric == true || inputs.run_full_rubric == 'true')) || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'staging')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ".go-version"
          cache: false
      - name: Install dependencies
        run: cd ts && npm ci
      - name: Run full rubric
        run: bash gov-infra/verifiers/gov-verify-rubric.sh
      - name: Upload governance evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gov-infra-evidence
          path: gov-infra/evidence/
          if-no-files-found: error

  theorycloud-subtree:
    name: TheoryCloud subtree publishing path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify helper shell syntax
        run: |
          bash -n scripts/stage_theorycloud_facetheory_subtree.sh
          bash -n scripts/verify_theorycloud_facetheory_subtree.sh
          bash -n scripts/sync_theorycloud_facetheory_subtree.sh
          bash -n scripts/trigger_theorycloud_publish.sh
          bash -n scripts/test-theorycloud-targets.sh
          bash -n scripts/test-trigger-theorycloud-publish-awscurl.sh
      - name: Verify no-vars publisher workflow contract
        run: |
          set -euo pipefail

          workflow=".github/workflows/theorycloud-facetheory-subtree-publish.yml"
          grep -Fq 'arn:aws:iam::787107040121:role/KnowledgeTheory-TheoryCloud-FaceTheory-lab-Publisher' "${workflow}"
          grep -Fq 'arn:aws:iam::787107040121:role/KnowledgeTheory-TheoryCloud-FaceTheory-live-Publisher' "${workflow}"

          if grep -Fq 'vars.THEORYCLOUD_AWS_ROLE_ARN_' "${workflow}"; then
            echo "theorycloud-subtree: FAIL (publisher workflow still references vars-based role selection)" >&2
            exit 1
          fi
      - name: Verify subtree staging + provenance
        run: |
          bash scripts/stage_theorycloud_facetheory_subtree.sh --output /tmp/facetheory-theorycloud
          bash scripts/verify_theorycloud_facetheory_subtree.sh /tmp/facetheory-theorycloud
      - name: Verify sync/publish helper dry runs
        run: |
          THEORYCLOUD_S3_SYNC_DRY_RUN=true bash scripts/sync_theorycloud_facetheory_subtree.sh --stage lab
          THEORYCLOUD_S3_SYNC_DRY_RUN=true bash scripts/sync_theorycloud_facetheory_subtree.sh --stage live
          THEORYCLOUD_PUBLISH_DRY_RUN=true bash scripts/trigger_theorycloud_publish.sh --stage lab --source-revision abc123def456 --idempotency-key ci-lab
          THEORYCLOUD_PUBLISH_DRY_RUN=true bash scripts/trigger_theorycloud_publish.sh --stage live --source-revision abc123def456 --idempotency-key ci-live
      - name: Verify shared rollout target fixtures
        run: |
          bash scripts/test-theorycloud-targets.sh
          bash scripts/test-trigger-theorycloud-publish-awscurl.sh
