name: Release (main)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Optional: upload assets to an existing tag's draft release (e.g. v0.2.0)"
        required: false

permissions:
  contents: read

jobs:
  build-existing-tag-assets:
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_id: ${{ steps.source.outputs.release_id }}
    steps:
      - name: Checkout release workflow scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Stage trusted release provenance scripts
        run: |
          set -euo pipefail
          trusted_dir="${RUNNER_TEMP}/facetheory-release-scripts"
          mkdir -p "${trusted_dir}"
          cp \
            scripts/release-json-by-tag.sh \
            scripts/resolve-release-source-ref.sh \
            scripts/verify-release-branch.sh \
            scripts/verify-release-draft-target.sh \
            "${trusted_dir}/"
          chmod +x "${trusted_dir}"/*.sh

      - name: Resolve release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY:?}"
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-metadata: SKIP (missing tag name)"
            exit 0
          fi

          release_json=""
          for page in $(seq 1 10); do
            page_file="$(mktemp)"
            gh api "repos/${repo}/releases?per_page=100&page=${page}" > "${page_file}"
            match="$(
              TAG_NAME="${TAG_NAME}" python3 - "${page_file}" <<'PY'
          import json
          import os
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          for release in data:
              if release.get("tag_name") != os.environ["TAG_NAME"]:
                  continue
              wanted = ("id", "tag_name", "target_commitish", "draft", "prerelease", "html_url")
              print(json.dumps({key: release.get(key) for key in wanted}, separators=(",", ":")))
              break
          PY
            )"
            count="$(python3 - "${page_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          print(len(data) if isinstance(data, list) else 0)
          PY
            )"
            rm -f "${page_file}"
            if [[ -n "${match}" ]]; then
              release_json="${match}"
              break
            fi
            [[ "${count}" =~ ^[0-9]+$ ]] || count=0
            [[ "${count}" -lt 100 ]] && break
          done

          if [[ -z "${release_json}" ]]; then
            echo "release-metadata: SKIP (${TAG_NAME} not found)"
            exit 0
          fi

          {
            echo "release_json<<__FACETHEORY_RELEASE_JSON__"
            printf '%s\n' "${release_json}"
            echo "__FACETHEORY_RELEASE_JSON__"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve release source ref
        id: source
        env:
          RELEASE_JSON: ${{ steps.metadata.outputs.release_json }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          "${RUNNER_TEMP}/facetheory-release-scripts/resolve-release-source-ref.sh" "${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Checkout (for tag-triggered assets)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.source.outputs.source_ref }}

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24.13.1"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ".go-version"
          cache: false

      - name: Build assets for existing tag release
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
          RELEASE_IS_DRAFT: ${{ steps.source.outputs.release_is_draft }}
          RELEASE_TARGET: ${{ steps.source.outputs.release_target }}
          RELEASE_SOURCE_COMMIT: ${{ steps.source.outputs.release_source_commit }}
        run: |
          set -euo pipefail

          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-assets: FAIL (missing tag ref_name)"
            exit 1
          fi

          git fetch origin main --force
          git fetch origin premain --force || true

          # Existing draft tags may predate synchronized version manifests.
          # Normalize the workspace copy so verification/build scripts use the requested tag version.
          if [[ -f VERSION ]]; then
            printf '%s # x-release-please-version\n' "${TAG_NAME#v}" > VERSION
          fi

          RELEASE_VERSION="${TAG_NAME#v}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          is_prerelease = "-rc" in version.split("+", 1)[0]


          def update_manifest(path: str) -> None:
              manifest = Path(path)
              if not manifest.exists():
                  return
              data = json.loads(manifest.read_text(encoding="utf-8"))
              data["."] = version
              manifest.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")


          if not is_prerelease:
              update_manifest(".release-please-manifest.json")
          update_manifest(".release-please-manifest.premain.json")
          PY

          if [[ "${RELEASE_IS_DRAFT}" == "true" ]]; then
            actual_commit="$(git rev-parse HEAD)"
            if [[ -n "${RELEASE_SOURCE_COMMIT}" && "${actual_commit}" != "${RELEASE_SOURCE_COMMIT}" ]]; then
              echo "release-assets: FAIL (${TAG_NAME} source resolved to ${RELEASE_SOURCE_COMMIT}, checked out ${actual_commit})"
              exit 1
            fi
            RELEASE_JSON="${{ steps.metadata.outputs.release_json }}" \
              REPO_ROOT="${GITHUB_WORKSPACE}" \
              "${RUNNER_TEMP}/facetheory-release-scripts/verify-release-draft-target.sh" "${TAG_NAME}" HEAD
          fi

          REPO_ROOT="${GITHUB_WORKSPACE}" \
            "${RUNNER_TEMP}/facetheory-release-scripts/verify-release-branch.sh" "${TAG_NAME}"

          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          cd ts && npm ci
          cd ..
          make rubric
          scripts/build-release-assets.sh "${TAG_NAME#v}" dist
          scripts/generate-checksums.sh

      - name: Upload existing tag asset bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: facetheory-existing-tag-assets
          path: |
            dist/theory-cloud-facetheory*.tgz
            dist/facetheory-reference-*.tar.gz
            dist/SHA256SUMS.txt
          if-no-files-found: error

  publish-existing-tag-release:
    needs: build-existing-tag-assets
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download existing tag asset bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: facetheory-existing-tag-assets
          path: dist

      - name: Upload and publish existing tag draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY:?}"
          dist_dir="dist"
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-assets: FAIL (missing tag name)"
            exit 1
          fi
          if [[ ! -d "${dist_dir}" ]]; then
            echo "release-assets: FAIL (missing asset directory ${dist_dir})"
            exit 1
          fi

          release_json=""
          for page in $(seq 1 10); do
            page_file="$(mktemp)"
            gh api "repos/${repo}/releases?per_page=100&page=${page}" > "${page_file}"
            match="$(
              TAG_NAME="${TAG_NAME}" python3 - "${page_file}" <<'PY'
          import json
          import os
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          for release in data:
              if release.get("tag_name") == os.environ["TAG_NAME"] and release.get("draft") is True:
                  print(json.dumps(release, separators=(",", ":")))
                  break
          PY
            )"
            count="$(python3 - "${page_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          print(len(data) if isinstance(data, list) else 0)
          PY
            )"
            rm -f "${page_file}"
            if [[ -n "${match}" ]]; then
              release_json="${match}"
              break
            fi
            [[ "${count}" -lt 100 ]] && break
          done

          if [[ -z "${release_json}" ]]; then
            echo "release-assets: FAIL (draft release ${TAG_NAME} not found)"
            exit 1
          fi

          mapfile -t release_fields < <(
            RELEASE_JSON="${release_json}" python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RELEASE_JSON"])
          print(str(data.get("id") or ""))
          print("true" if data.get("prerelease") is True else "false")
          print(data.get("upload_url") or "")
          print(data.get("html_url") or "")
          PY
          )
          release_id="${release_fields[0]:-}"
          is_prerelease="${release_fields[1]:-false}"
          upload_url="${release_fields[2]:-}"
          release_url="${release_fields[3]:-}"

          if [[ -z "${release_id}" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} draft missing release id)"
            exit 1
          fi
          if [[ "${TAG_NAME}" =~ -rc(\.|$) && "${is_prerelease}" != "true" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} draft must be marked prerelease)"
            exit 1
          fi
          if [[ ! "${TAG_NAME}" =~ -rc(\.|$) && "${is_prerelease}" == "true" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} stable draft must not be marked prerelease)"
            exit 1
          fi

          mapfile -t existing_assets < <(gh api "repos/${repo}/releases/${release_id}/assets" --jq '.[].name' 2>/dev/null || true)
          upload_base="${upload_url%%\{*}"
          if [[ -z "${upload_base}" ]]; then
            upload_base="https://uploads.github.com/repos/${repo}/releases/${release_id}/assets"
          fi

          shopt -s nullglob
          asset_paths=(
            "${dist_dir}"/theory-cloud-facetheory*.tgz
            "${dist_dir}"/facetheory-reference-*.tar.gz
            "${dist_dir}"/SHA256SUMS.txt
          )
          shopt -u nullglob
          if [[ "${#asset_paths[@]}" -eq 0 ]]; then
            echo "release-assets: FAIL (no release assets found in ${dist_dir})"
            exit 1
          fi

          for asset_path in "${asset_paths[@]}"; do
            asset_name="$(basename "${asset_path}")"
            if printf '%s\n' "${existing_assets[@]}" | grep -Fxq "${asset_name}"; then
              echo "release-assets: skip existing ${asset_name}"
              continue
            fi
            encoded_name="$(ASSET_NAME="${asset_name}" python3 - <<'PY'
          import os
          import urllib.parse

          print(urllib.parse.quote(os.environ["ASSET_NAME"]))
          PY
            )"
            gh api \
              --method POST \
              "${upload_base}?name=${encoded_name}" \
              --header "Content-Type: application/octet-stream" \
              --input "${asset_path}" \
              >/dev/null
          done

          prerelease_field="false"
          if [[ "${TAG_NAME}" =~ -rc(\.|$) ]]; then
            prerelease_field="true"
          fi
          gh api \
            --method PATCH \
            "repos/${repo}/releases/${release_id}" \
            -F draft=false \
            -F prerelease="${prerelease_field}" \
            >/dev/null
          echo "release-assets: published ${TAG_NAME}${release_url:+ (${release_url})}"

  stable-preflight:
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.tag_name == '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.ready.outputs.ready }}
    steps:
      - name: Checkout (stable release preflight)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.sha }}

      - name: Verify version alignment before release creation
        run: scripts/verify-version-alignment.sh

      - name: Mark stable release ready
        id: ready
        run: echo "ready=true" >> "${GITHUB_OUTPUT}"

  release-please:
    needs: stable-preflight
    if: needs.stable-preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout (stable release state)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.sha }}

      - name: Recover missing current stable Release Please state
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail

          version="$(
            python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path(".release-please-manifest.json").read_text(encoding="utf-8"))
          version = str(data.get(".", "")).strip()
          if not version:
              raise SystemExit("missing stable release-please manifest version")
          print(version)
          PY
          )"
          tag="v${version}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "release-recovery: ${tag} release already exists"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "release-recovery: ${tag} tag already exists"
            exit 0
          fi

          expected_title="chore(main): release ${version}"
          pending_number="$(
            EXPECTED_TITLE="${expected_title}" gh pr list \
              --state merged \
              --base main \
              --label "autorelease: pending" \
              --limit 50 \
              --json number,title \
              --jq 'map(select(.title == env.EXPECTED_TITLE)) | .[0].number // ""'
          )"
          if [[ -n "${pending_number}" ]]; then
            echo "release-recovery: ${tag} already pending on PR #${pending_number}"
            exit 0
          fi

          tagged_number="$(
            EXPECTED_TITLE="${expected_title}" gh pr list \
              --state merged \
              --base main \
              --label "autorelease: tagged" \
              --limit 50 \
              --json number,title \
              --jq 'map(select(.title == env.EXPECTED_TITLE)) | .[0].number // ""'
          )"

          if [[ -z "${tagged_number}" ]]; then
            echo "release-recovery: FAIL (${tag} is missing and no merged ${expected_title} PR is pending/tagged)"
            exit 1
          fi

          echo "release-recovery: resetting PR #${tagged_number} from tagged to pending for ${tag}"
          gh pr edit "${tagged_number}" \
            --remove-label "autorelease: tagged" \
            --add-label "autorelease: pending"

      - name: Release Please (Stable)
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

  build-release-assets:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve draft release metadata
        id: draft
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY:?}"
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-draft-metadata: FAIL (missing tag name)"
            exit 1
          fi

          release_json=""
          # Release Please can report release_created before GitHub's releases
          # listing API exposes the untagged draft. Poll long enough for that
          # API lag without handing release-capable credentials to repo scripts.
          for attempt in $(seq 1 36); do
            for page in $(seq 1 10); do
              page_file="$(mktemp)"
              gh api "repos/${repo}/releases?per_page=100&page=${page}" > "${page_file}"
              match="$(
                TAG_NAME="${TAG_NAME}" python3 - "${page_file}" <<'PY'
          import json
          import os
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          for release in data:
              if release.get("tag_name") != os.environ["TAG_NAME"]:
                  continue
              if release.get("draft") is not True:
                  continue
              wanted = ("id", "tag_name", "target_commitish", "draft", "prerelease", "html_url")
              print(json.dumps({key: release.get(key) for key in wanted}, separators=(",", ":")))
              break
          PY
              )"
              count="$(python3 - "${page_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          print(len(data) if isinstance(data, list) else 0)
          PY
              )"
              rm -f "${page_file}"
              if [[ -n "${match}" ]]; then
                release_json="${match}"
                break
              fi
              [[ "${count}" =~ ^[0-9]+$ ]] || count=0
              [[ "${count}" -lt 100 ]] && break
            done
            [[ -n "${release_json}" ]] && break
            sleep 5
          done

          if [[ -z "${release_json}" ]]; then
            echo "release-draft-metadata: FAIL (draft release ${TAG_NAME} not found)"
            exit 1
          fi

          {
            echo "release_json<<__FACETHEORY_RELEASE_JSON__"
            printf '%s\n' "${release_json}"
            echo "__FACETHEORY_RELEASE_JSON__"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout (for release assets)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          # Draft GitHub Releases do not guarantee a git tag exists until the
          # release is published. Build from the release commit and verify the
          # draft's target before uploading immutable assets.
          ref: ${{ github.sha }}

      - name: Fetch main + premain (release branch verification)
        run: |
          git fetch origin main --force
          git fetch origin premain --force || true

      - name: Verify draft release targets this commit
        env:
          RELEASE_JSON: ${{ steps.draft.outputs.release_json }}
        run: scripts/verify-release-draft-target.sh "${{ needs.release-please.outputs.tag_name }}" "${{ github.sha }}"

      - name: Verify release source branch
        run: scripts/verify-release-branch.sh "${{ needs.release-please.outputs.tag_name }}"

      - name: Set SOURCE_DATE_EPOCH (deterministic artifacts)
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24.13.1"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ".go-version"
          cache: false

      - name: Install dependencies
        run: cd ts && npm ci

      - name: Build + verify
        run: make rubric

      - name: Build release assets
        run: scripts/build-release-assets.sh "${{ needs.release-please.outputs.version }}" dist

      - name: Generate SHA-256 checksums
        run: scripts/generate-checksums.sh


      - name: Upload release asset bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: facetheory-stable-assets
          path: |
            dist/theory-cloud-facetheory*.tgz
            dist/facetheory-reference-*.tar.gz
            dist/SHA256SUMS.txt
          if-no-files-found: error

  publish-release:
    needs:
      - release-please
      - build-release-assets
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release asset bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: facetheory-stable-assets
          path: dist

      - name: Upload and publish draft release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY:?}"
          dist_dir="dist"
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-assets: FAIL (missing tag name)"
            exit 1
          fi

          release_json=""
          for page in $(seq 1 10); do
            page_file="$(mktemp)"
            gh api "repos/${repo}/releases?per_page=100&page=${page}" > "${page_file}"
            match="$(
              TAG_NAME="${TAG_NAME}" python3 - "${page_file}" <<'PY'
          import json
          import os
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          for release in data:
              if release.get("tag_name") == os.environ["TAG_NAME"] and release.get("draft") is True:
                  print(json.dumps(release, separators=(",", ":")))
                  break
          PY
            )"
            count="$(python3 - "${page_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)
          print(len(data) if isinstance(data, list) else 0)
          PY
            )"
            rm -f "${page_file}"
            if [[ -n "${match}" ]]; then
              release_json="${match}"
              break
            fi
            [[ "${count}" -lt 100 ]] && break
          done

          if [[ -z "${release_json}" ]]; then
            echo "release-assets: FAIL (draft release ${TAG_NAME} not found)"
            exit 1
          fi

          mapfile -t release_fields < <(
            RELEASE_JSON="${release_json}" python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RELEASE_JSON"])
          print(str(data.get("id") or ""))
          print("true" if data.get("prerelease") is True else "false")
          print(data.get("upload_url") or "")
          print(data.get("html_url") or "")
          PY
          )
          release_id="${release_fields[0]:-}"
          is_prerelease="${release_fields[1]:-false}"
          upload_url="${release_fields[2]:-}"
          release_url="${release_fields[3]:-}"

          if [[ -z "${release_id}" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} draft missing release id)"
            exit 1
          fi
          if [[ "${TAG_NAME}" =~ -rc(\.|$) && "${is_prerelease}" != "true" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} draft must be marked prerelease)"
            exit 1
          fi
          if [[ ! "${TAG_NAME}" =~ -rc(\.|$) && "${is_prerelease}" == "true" ]]; then
            echo "release-assets: FAIL (${TAG_NAME} stable draft must not be marked prerelease)"
            exit 1
          fi

          mapfile -t existing_assets < <(gh api "repos/${repo}/releases/${release_id}/assets" --jq '.[].name' 2>/dev/null || true)
          upload_base="${upload_url%%\{*}"
          if [[ -z "${upload_base}" ]]; then
            upload_base="https://uploads.github.com/repos/${repo}/releases/${release_id}/assets"
          fi

          shopt -s nullglob
          asset_paths=(
            "${dist_dir}"/theory-cloud-facetheory*.tgz
            "${dist_dir}"/facetheory-reference-*.tar.gz
            "${dist_dir}"/SHA256SUMS.txt
          )
          shopt -u nullglob
          if [[ "${#asset_paths[@]}" -eq 0 ]]; then
            echo "release-assets: FAIL (no release assets found in ${dist_dir})"
            exit 1
          fi

          for asset_path in "${asset_paths[@]}"; do
            asset_name="$(basename "${asset_path}")"
            if printf '%s\n' "${existing_assets[@]}" | grep -Fxq "${asset_name}"; then
              echo "release-assets: skip existing ${asset_name}"
              continue
            fi
            encoded_name="$(ASSET_NAME="${asset_name}" python3 - <<'PY'
          import os
          import urllib.parse

          print(urllib.parse.quote(os.environ["ASSET_NAME"]))
          PY
            )"
            gh api \
              --method POST \
              "${upload_base}?name=${encoded_name}" \
              --header "Content-Type: application/octet-stream" \
              --input "${asset_path}" \
              >/dev/null
          done

          gh api \
            --method PATCH \
            "repos/${repo}/releases/${release_id}" \
            -F draft=false \
            -F prerelease=false \
            >/dev/null
          echo "release-assets: published ${TAG_NAME}${release_url:+ (${release_url})}"

  cleanup-failed-draft:
    needs:
      - release-please
      - build-release-assets
      - publish-release
    if: >-
      ${{
        always() &&
        needs.release-please.outputs.release_created == 'true' &&
        (
          needs.build-release-assets.result == 'failure' ||
          needs.build-release-assets.result == 'cancelled' ||
          needs.publish-release.result == 'failure' ||
          needs.publish-release.result == 'cancelled'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Cleanup failed draft stable release (no remnants)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release-cleanup: SKIP (missing tag_name output)"
            exit 0
          fi

          release_id=""
          for attempt in 1 2 3 4 5 6; do
            release_id="$(
              TAG_NAME="${TAG_NAME}" gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
                --jq 'map(select(.tag_name == env.TAG_NAME and .draft == true)) | .[0].id // ""' \
                2>/dev/null || true
            )"
            [[ -n "${release_id}" ]] && break
            sleep 5
          done

          if [[ -z "${release_id}" ]]; then
            echo "release-cleanup: SKIP (draft release not found)"
            exit 0
          fi

          echo "release-cleanup: deleting draft release ${release_id} and tag ${TAG_NAME}"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}" || true
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG_NAME}" || true
